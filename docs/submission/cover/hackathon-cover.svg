<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">The AI Charter hackathon cover image</title>
  <desc id="desc">A retro-futuristic governance panel showing The AI Charter coordinating ethics, security, legal, compliance, and product agents.</desc>

  <defs>
    <linearGradient id="creamWash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF8F5"/>
      <stop offset="55%" stop-color="#F3EFE5"/>
      <stop offset="100%" stop-color="#E6E1D4"/>
    </linearGradient>
    <linearGradient id="panelGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25303E"/>
      <stop offset="55%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#76E1A7"/>
      <stop offset="100%" stop-color="#8BF5BD"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A1DFF5"/>
      <stop offset="100%" stop-color="#38B0E8"/>
    </linearGradient>
    <radialGradient id="greenAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#76E1A7" stop-opacity="0.45"/>
      <stop offset="62%" stop-color="#76E1A7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#76E1A7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A1DFF5" stop-opacity="0.32"/>
      <stop offset="70%" stop-color="#A1DFF5" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#A1DFF5" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#1F2937" flood-opacity="0.18"/>
    </filter>
    <filter id="greenBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#C7C7C7" stroke-width="1" opacity="0.35"/>
    </pattern>
    <pattern id="microGrid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#C7C7C7" stroke-width="1" opacity="0.18"/>
    </pattern>
    <clipPath id="panelClip">
      <rect x="760" y="118" width="690" height="620" rx="28"/>
    </clipPath>
  </defs>

  <rect width="1600" height="900" fill="url(#creamWash)"/>
  <rect width="1600" height="900" fill="url(#microGrid)" opacity="0.7"/>
  <rect x="72" y="72" width="1456" height="756" rx="36" fill="none" stroke="#C7C7C7" stroke-width="2"/>
  <rect x="88" y="88" width="1424" height="724" rx="28" fill="none" stroke="#C7C7C7" stroke-width="1" stroke-dasharray="10 14"/>
