    <text x="0" y="84" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="900" fill="#1F2937" letter-spacing="-3">THE AI</text>
    <text x="0" y="154" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="900" fill="#1F2937" letter-spacing="-3">CHARTER</text>
