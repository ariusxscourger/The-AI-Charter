      <text x="38" y="82" font-family="Fira Code, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#A1DFF5">❯ proposal.review()</text>
      <text x="38" y="112" font-family="Fira Code, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#76E1A7">✓ audit ledger generated</text>
