    <text x="4" y="277" font-family="Inter, Arial, sans-serif" font-size="24" fill="#1F2937" font-weight="650">Transparent review for high-stakes AI features.</text>
    <text x="4" y="324" font-family="Inter, Arial, sans-serif" font-size="21" fill="#1F2937" opacity="0.72">Ethics, security, legal, compliance, and product agents</text>
    <text x="4" y="356" font-family="Inter, Arial, sans-serif" font-size="21" fill="#1F2937" opacity="0.72">turn proposals into a visible audit ledger.</text>

