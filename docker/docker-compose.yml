name: the-ai-charter

services:
  db:
    image: postgres:15-alpine
    container_name: charter-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-charter_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    container_name: charter-backend
    restart: always
    ports:
      - "8001:8000"
    env_file:
      - ../.env
    environment:
      - JWT_SECRET=${JWT_SECRET:-fallback_jwt_secret_hackathon_2026}
    volumes:
      - ../backend:/app
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && uvicorn orchestrator.main:app --host 0.0.0.0 --port 8000 --reload",
      ]
    depends_on:
      - db

  frontend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend
    container_name: charter-frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8001
    volumes:
      - ../web:/app
      - /app/node_modules
      - /app/.next
    command: ["pnpm", "dev"]
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
